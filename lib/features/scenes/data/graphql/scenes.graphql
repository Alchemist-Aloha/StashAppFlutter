query FindScenes($filter: FindFilterType, $scene_filter: SceneFilterType) {
  findScenes(filter: $filter, scene_filter: $scene_filter) {
    count
    scenes {
      id
      title
      date
      rating100
      paths {
        screenshot
        preview
      }
      studio {
        id
        name
      }
      performers {
        id
        name
      }
    }
  }
}

query FindScene($id: ID!) {
  findScene(id: $id) {
    id
    title
    details
    path
    date
    rating
    rating100
  }
}

query SceneStreams($id: ID!) {
  findScene(id: $id) {
    sceneStreams {
      url
      mime_type
      label
    }
  }
}
