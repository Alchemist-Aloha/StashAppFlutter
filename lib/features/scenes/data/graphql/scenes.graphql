fragment SlimSceneData on Scene {
  id
  title
  date
  rating100
  o_counter
  organized
  interactive
  resume_time
  play_count
  files {
    path
    duration
  }
  paths {
    screenshot
    preview
    stream
  }
  studio {
    id
    name
    image_path
  }
  performers {
    id
    name
    image_path
  }
}

fragment SceneData on Scene {
  ...SlimSceneData
  details
  urls
  director
  files {
    path
    basename
    format
    width
    height
    video_codec
    audio_codec
    bit_rate
    duration
    frame_rate
  }
  tags {
    id
    name
  }
}

query FindScenes($filter: FindFilterType, $scene_filter: SceneFilterType) {
  findScenes(filter: $filter, scene_filter: $scene_filter) {
    count
    scenes {
      ...SlimSceneData
    }
  }
}

query FindScene($id: ID!) {
  findScene(id: $id) {
    ...SceneData
  }
}

query SceneStreams($id: ID!) {
  findScene(id: $id) {
    sceneStreams {
      url
      mime_type
      label
    }
  }
}

query ListSceneScrapers {
  listScrapers(types: [SCENE]) {
    id
    name
    scene {
      supported_scrapes
    }
  }
}

query ScrapeSingleScene(
  $source: ScraperSourceInput!
  $input: ScrapeSingleSceneInput!
) {
  scrapeSingleScene(source: $source, input: $input) {
    title
    code
    details
    director
    urls
    date
    image
    studio {
      stored_id
      name
    }
    tags {
      stored_id
      name
    }
    performers {
      stored_id
      name
    }
  }
}

mutation UpdateScene($input: SceneUpdateInput!) {
  sceneUpdate(input: $input) {
    id
    title
    details
    date
    director
    urls
    studio {
      id
      name
    }
    tags {
      id
      name
    }
    performers {
      id
      name
    }
  }
}
