name: Nightly Release Build

on:
  push:
    branches:
      - dev
  schedule:
    - cron: '0 3 * * *' # daily at 03:00 UTC
  workflow_dispatch: {}

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Accept Android licenses
        run: |
          yes | flutter doctor --android-licenses || true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare release metadata
        id: meta
        run: |
          DATE=$(date -u +%Y%m%d)
          echo "RELEASE_TAG=nightly-$DATE" >> $GITHUB_ENV
          echo "RELEASE_NAME=Nightly build $DATE" >> $GITHUB_ENV

      - name: Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RELEASE_TAG }}-apks
          path: build/app/outputs/flutter-apk/*.apk

      - name: Create draft GitHub release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          release_name: ${{ env.RELEASE_NAME }}
          draft: true
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APKs to release
        if: steps.create_release.outputs.upload_url != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPLOAD_URL: ${{ steps.create_release.outputs.upload_url }}
        run: |
          set -e
          for file in build/app/outputs/flutter-apk/*.apk; do
            [ -f "$file" ] || continue
            filename=$(basename "$file")
            echo "Uploading $filename to release"
            curl -s -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/vnd.android.package-archive" \
              --data-binary @"$file" "$UPLOAD_URL?name=$filename"
          done
