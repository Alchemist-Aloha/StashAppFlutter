scalar Time

type Query {
  findScenes(filter: FindFilterType, scene_filter: SceneFilterType): FindScenesResultType!
  findScene(id: ID!): Scene
  findPerformers(filter: FindFilterType, performer_filter: PerformerFilterType): FindPerformersResultType!
  findPerformer(id: ID!): Performer
}

input FindFilterType {
  q: String
  page: Int
  per_page: Int
  sort: String
  direction: SortDirectionEnum
}

enum SortDirectionEnum {
  ASC
  DESC
}

input SceneFilterType {
  # Add basic filter fields if needed
  id: Int
}

input PerformerFilterType {
  # Add basic filter fields if needed
  name: String
}

type FindScenesResultType {
  count: Int!
  scenes: [Scene!]!
}

type FindPerformersResultType {
  count: Int!
  performers: [Performer!]!
}

type Scene {
  id: ID!
  title: String
  details: String
  path: String
  date: String
  rating100: Int
  o_counter: Int
  organized: Boolean!
  interactive: Boolean!
  resume_time: Float
  play_count: Int
  files: [VideoFile!]!
  paths: ScenePathsType!
  studio: Studio
  performers: [Performer!]!
  tags: [Tag!]!
  sceneStreams: [SceneStreamEndpoint!]!
}

type VideoFile {
  id: ID!
  path: String!
  format: String
  width: Int
  height: Int
  video_codec: String
  audio_codec: String
  bit_rate: Int
}

type ScenePathsType {
  screenshot: String
  preview: String
  stream: String
}

type Studio {
  id: ID!
  name: String!
  image_path: String
}

type Performer {
  id: ID!
  name: String!
  disambiguation: String
  urls: [String!]!
  gender: String
  birthdate: String
  ethnicity: String
  country: String
  eye_color: String
  height_cm: Int
  measurements: String
  fake_tits: String
  penis_length: Float
  circumcised: String
  career_start: String
  career_end: String
  tattoos: String
  piercings: String
  alias_list: [String!]!
  favorite: Boolean!
  image_path: String
  scene_count: Int!
  image_count: Int!
  gallery_count: Int!
  group_count: Int!
  rating100: Int
  details: String
  death_date: String
  hair_color: String
  weight: Int
  tags: [Tag!]!
}

type Tag {
  id: ID!
  name: String!
  description: String
}

type SceneStreamEndpoint {
  url: String!
  mime_type: String
  label: String
}

schema {
  query: Query
}
